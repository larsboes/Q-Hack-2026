<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <!-- Background -->
  <rect width="800" height="300" fill="#0f172a" rx="12"/>

  <!-- Boxes -->
  <!-- Input -->
  <rect x="30" y="110" width="120" height="60" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="90" y="135" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">User Input</text>
  <text x="90" y="153" text-anchor="middle" fill="#64748b" font-size="11">prompt + context</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="140" x2="195" y2="140" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Plan -->
  <rect x="195" y="110" width="120" height="60" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="255" y="135" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="bold">Plan</text>
  <text x="255" y="153" text-anchor="middle" fill="#64748b" font-size="11">LLM decides</text>

  <!-- Arrow 2 -->
  <line x1="315" y1="140" x2="360" y2="140" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Act -->
  <rect x="360" y="110" width="120" height="60" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="420" y="135" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">Act</text>
  <text x="420" y="153" text-anchor="middle" fill="#64748b" font-size="11">tool execute</text>

  <!-- Arrow 3 -->
  <line x1="480" y1="140" x2="525" y2="140" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Observe -->
  <rect x="525" y="110" width="120" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="585" y="135" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="bold">Observe</text>
  <text x="585" y="153" text-anchor="middle" fill="#64748b" font-size="11">tool result</text>

  <!-- Loop arrow back -->
  <path d="M645 140 Q700 140 700 220 Q700 270 420 270 Q140 270 140 220 Q140 170 195 155"
        fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3"
        marker-end="url(#arrow-yellow)"/>
  <text x="700" y="215" text-anchor="middle" fill="#f59e0b" font-size="11">loop</text>

  <!-- Permission label on Act box -->
  <rect x="360" y="185" width="120" height="28" rx="4" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
  <text x="420" y="203" text-anchor="middle" fill="#10b981" font-size="10">allow / ask / deny</text>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">OpenCode Agent Loop</text>
  <text x="400" y="55" text-anchor="middle" fill="#64748b" font-size="12">Plan → Act → Observe → Repeat</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
